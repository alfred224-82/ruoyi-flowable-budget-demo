<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>待审批通知</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; padding: 20px; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #ff9800; border-bottom: 2px solid #ff9800; padding-bottom: 10px;">待审批通知</h2>
        <p>尊敬的 <strong>${receiver_name}</strong>：</p>
        <p>您有一条待审批的预算编制，请及时处理。</p>

        <div style="background: #fff3e0; padding: 15px; border-left: 4px solid #ff9800; margin: 20px 0;">
            <strong>预算单号：</strong> ${sheet_no}<br/>
            <strong>编制部门：</strong> ${dept_name}<br/>
            <strong>编制人：</strong> ${create_by_name}
        </div>

        <div style="background: #e8f5e9; padding: 15px; border-left: 4px solid #4caf50; margin: 20px 0;">
            <strong>操作链接：</strong> <a href="${system_url}${biz_url}">点击进入审批</a>
        </div>

        <p style="color: #666; font-size: 12px; margin-top: 30px;">此邮件由系统自动发送，请勿直接回复。</p>
    </div>
</body>
</html>
