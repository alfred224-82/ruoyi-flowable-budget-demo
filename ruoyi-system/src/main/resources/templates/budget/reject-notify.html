<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>预算驳回通知</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; padding: 20px; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #e74c3c; border-bottom: 2px solid #e74c3c; padding-bottom: 10px;">预算驳回通知</h2>
        <p>尊敬的 <strong>${receiver_name}</strong>：</p>
        <p>您编制的预算单 <strong>${sheet_no}</strong>（${budget_period}，${dept_name}）已被 <strong>${reject_level}</strong> 驳回。</p>

        <div style="background: #fff3cd; padding: 15px; border-left: 4px solid #ffc107; margin: 20px 0;">
            <strong>驳回理由：</strong><br/>
            ${reject_reason}
        </div>

        <div style="background: #e8f5e9; padding: 15px; border-left: 4px solid #4caf50; margin: 20px 0;">
            <strong>截止时间：</strong> ${deadline_time}<br/>
            <strong>操作链接：</strong> <a href="${system_url}${biz_url}">点击修改预算</a>
        </div>

        <p style="color: #666; font-size: 12px; margin-top: 30px;">此邮件由系统自动发送，请勿直接回复。</p>
    </div>
</body>
</html>
