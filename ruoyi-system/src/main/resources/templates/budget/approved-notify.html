<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>审批通过通知</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; padding: 20px; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #4caf50; border-bottom: 2px solid #4caf50; padding-bottom: 10px;">审批通过通知</h2>
        <p>尊敬的 <strong>${receiver_name}</strong>：</p>
        <p>恭喜！您编制的预算单 <strong>${sheet_no}</strong>（${budget_period}）已通过全部审批流程。</p>

        <div style="background: #e8f5e9; padding: 15px; border-left: 4px solid #4caf50; margin: 20px 0;">
            <strong>审批结果：</strong> 三级审批全部通过<br/>
            <strong>状态说明：</strong> 预算已锁定，不可再修改
        </div>

        <div style="background: #f5f5f5; padding: 15px; border-left: 4px solid #9e9e9e; margin: 20px 0;">
            <strong>系统链接：</strong> <a href="${system_url}">登录系统查看详情</a>
        </div>

        <p style="color: #666; font-size: 12px; margin-top: 30px;">此邮件由系统自动发送，请勿直接回复。</p>
    </div>
</body>
</html>
