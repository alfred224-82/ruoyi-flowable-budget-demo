<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>预算编制期开始提醒</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; padding: 20px; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #2196f3; border-bottom: 2px solid #2196f3; padding-bottom: 10px;">预算编制期开始提醒</h2>
        <p>尊敬的 <strong>${receiver_name}</strong>：</p>
        <p><strong>${budget_period}</strong> 预算编制期已开始，请及时完成预算编制工作。</p>

        <div style="background: #e3f2fd; padding: 15px; border-left: 4px solid #2196f3; margin: 20px 0;">
            <strong>编制期时间范围：</strong><br/>
            开始时间：${start_date}<br/>
            截止时间：${end_date}
        </div>

        <div style="background: #e8f5e9; padding: 15px; border-left: 4px solid #4caf50; margin: 20px 0;">
            <strong>操作链接：</strong> <a href="${system_url}">登录系统开始编制</a>
        </div>

        <p style="color: #666; font-size: 12px; margin-top: 30px;">此邮件由系统自动发送，请勿直接回复。</p>
    </div>
</body>
</html>
